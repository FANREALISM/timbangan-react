[database]
# Pilih jenis database: mysql atau sqlite
db_type = sqlite
# Mode simpan: local (hanya HP), server (hanya DB MySQL/SQLite), atau hybrid (keduanya)
save_mode = hybrid

# === Konfigurasi MySQL ===
mysql_host = localhost
# Ganti dengan IP jika menggunakan remote server, contoh: 192.168.1.100
mysql_port = 3306
mysql_user = root
mysql_password = 
mysql_database = db_timbangan

# === Konfigurasi SQLite ===
# Path ke file database SQLite (relatif terhadap script Python)
sqlite_path = timbangan.db

[server]
# Host server (localhost atau IP)
host = 0.0.0.0
port = 5000
debug = true
